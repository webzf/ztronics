title: ZTronics
email:
description: >-
  ESP32, Arduino, MPU6050 and OLED tutorials with wiring diagrams,
  code examples and project guides.

twitter_username:
github_username: webzf

minimal_mistakes_skin: neon

search: true

markdown: kramdown

remote_theme: mmistakes/minimal-mistakes

url: "https://webzf.github.io"
baseurl: "/ztronis"

permalink: /:categories/:title/

paginate: 5
paginate_path: /page:num/

timezone: Europe/Lisbon

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "ZTronics"
  avatar : "/assets/images/logo.png"
  bio    : "ESP32, Arduino and MPU6050 tutorials with code examples and electronics projects."

  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/webzf"

    - label: "YouTube"
      icon: "fab fa-fw fa-youtube"
      url: "https://youtube.com/@YOURCHANNEL"

    - label: "Pinterest"
      icon: "fab fa-fw fa-pinterest"
      url: "https://pinterest.com/YOURPROFILE"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/webzf"

    - label: "YouTube"
      icon: "fab fa-fw fa-youtube"
      url: "https://youtube.com/@YOURCHANNEL"

    - label: "Pinterest"
      icon: "fab fa-fw fa-pinterest"
      url: "https://pinterest.com/YOURPROFILE"

defaults:
  - scope:
      path: ""
      type: posts

    values:
      layout: single
      author_profile: false
      read_time: true
      comments: false
      share: true
      related: true

  - scope:
      path: "_pages"
      type: pages

    values:
      layout: single
      author_profile: false

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/
