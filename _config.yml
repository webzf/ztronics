remote_theme: "mmistakes/minimal-mistakes"

plugins:
  - jekyll-include-cache
minimal_mistakes_skin    : "neon"

locale                   : "en-US"

title                    : "ZTronics"
title_separator          : "-"
subtitle                 : "ESP32, Arduino, Raspberry Pi and Electronics Projects"

name                     : "ZTronics"

description              : "ESP32, Arduino, Raspberry Pi and electronics tutorials with code examples, wiring guides, sensors, displays and embedded projects."

url                      : "https://webzf.github.io"
baseurl                  : "/ztronics"

repository               : "webzf/ztronics"

teaser                   : "/assets/images/banner.jpg"
logo                     : "/assets/images/Banner1.png"

masthead_title           :

last_modified_at: false

breadcrumbs              : true

words_per_minute         : 200

enable_copy_code_button  : true

copyright                :
copyright_url            :

comments:
  provider               : false

atom_feed:
  path                   :
  hide                   : false

search                   : true
search_full_content      : true
search_provider          : lunr

# SEO Related
google_site_verification :
bing_site_verification   :
naver_site_verification  :
yandex_site_verification :
baidu_site_verification  :

# Social Sharing
twitter:
  username               :

facebook:
  username               :
  app_id                 :
  publisher              :

og_image                 :
og_image_alt             :

social:
  type                   : Organization
  name                   : ZTronics

  links:
    - "https://github.com/webzf"

# Analytics
analytics:
  provider               : false

# Site Author
author:
  name             : "ZTronics"
  avatar           : "/assets/images/banner.jpg"
  bio              : "A collection of practical electronics tutorials, embedded projects, and beginner-friendly guides focused on Arduino, ESP32, Raspberry Pi, sensors, displays, and DIY hardware development."
  location         : ""

  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/webzf"

    - label: "YouTube"
      icon: "fab fa-fw fa-youtube"
      url: "https://youtube.com/@YOURCHANNEL"

    - label: "Pinterest"
      icon: "fab fa-fw fa-pinterest"
      url: "https://pinterest.com/YOURPROFILE"

# Site Footer
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/webzf"

    - label: "YouTube"
      icon: "fab fa-fw fa-youtube"
      url: "https://youtube.com/@YOURCHANNEL"

    - label: "Pinterest"
      icon: "fab fa-fw fa-pinterest"
      url: "https://pinterest.com/YOURPROFILE"

  since: "2026"

# Reading Files
include:
  - .htaccess
  - _pages

exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - minimal-mistakes-jekyll.gemspec
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs
  - /test

keep_files:
  - .git
  - .svn

encoding: "utf-8"

markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown

highlighter: rouge

lsi: false

excerpt_separator: "\n\n"

incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed
  quiet_deps: true
  silence_deprecations: ['import']

# Outputting
permalink: /:title/

timezone: Europe/Lisbon

# Pagination
paginate: 5
paginate_path: /page:num/

pagination:
  debug: false
  collection: 'posts'
  per_page: 10
  permalink: '/page/:num/'
  title: ':title - page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: true
  category: 'posts'
  tag: ''
  locale: ''

  trail:
    before: 2
    after: 2

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-seo-tag

# Whitelist
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# Archives
category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all

  ignore:
    envs: development

# Defaults
defaults:
  - scope:
      path: ""
      type: posts

    values:
      layout: single
      author_profile: false
      read_time: false
      show_date: true
      comments: false
      share: true
      related: true
      last_modified_at: false

  - scope:
      path: "_pages"
      type: pages

    values:
      layout: single
      author_profile: false
     

