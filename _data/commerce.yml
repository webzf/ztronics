  # ---------------------------------------------------------------------------

  stores:

    amazon:
      enabled: true
      affiliate_url: ""

    aliexpress:
      enabled: true
      affiliate_url: "https://s.click.aliexpress.com/e/_c4n38hZ9"

    mouser:
      enabled: true
      affiliate_url: ""

    digikey:
      enabled: true
      affiliate_url: ""

    lcsc:
      enabled: true
      affiliate_url: ""

  # ---------------------------------------------------------------------------
  # OPTIONAL LABELS
  # ---------------------------------------------------------------------------

  badges:

    best_value: false

    editor_choice: false

    fast_shipping: false

    recommended: true

  # ---------------------------------------------------------------------------
