{% assign product = site.data.products[include.id] %}

{% if product %}

  {% assign store_name = include.store | default: "amazon" %}
  {% assign shop = product.stores[store_name] %}

  {% if shop and shop.url != "" %}

<a class="buy-button"
   href="{{ shop.url }}"
   target="_blank"
   rel="nofollow sponsored noopener">

{{ shop.icon }} Buy {{ product.short_name }} on {{ shop.name }}

</a>

  {% endif %}

{% endif %}
